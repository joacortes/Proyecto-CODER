    <main class="contenido">
        <section id="seccion__uno">
            <h2 class="titulo">Contacto</h2>
            <form action="" method="POST" enctype="text/plain">
                <label class="lblNombre" for="nombre">Nombre </label>
                <input class="txtNombre" type="text" name="nombre" placeholder="Ingrese su nombre">
        
                <label class="lblEmail" for="emails">Email </label>
                <input class="txtEmail" type="email" name="emails" placeholder="Ingrese su email">
                
                <label class="lblPhone" for="telefono">Telefono </label>
                <input class="txtPhone" type="tel" name="telefono" placeholder="Ingrese su telefono">
        
                <label class="lblAsunto" for="asunto">Asunto </label>
                <input class="txtAsunto" type="text" name="asunto" placeholder="Ingrese el asunto">
        
                <label class="lblPais" for="pais">Nacionalidad </label>
                <select class="comboBoxPais" name="pais">
                    <option value="ARG">Argentina</option>
                    <option value="BR">Brasil</option>
                    <option value="VEN">Venezuela</option>
                    <option value="PER">Peru</option>
                    <option value="BOL">Bolivia</option>
                    <option value="PAR">Paraguay</option>
                    <option value="UR">Uruguay</option>
                    <option value="CHI">Chile</option>
                </select>
        
                <label class="lblMensaje" for="mensaje">Mensaje </label>
                <textarea class="txtMensaje" name="mensaje" cols="30" rows="10" placeholder="Ingrese mensaje"></textarea>
        
                <input class="button" type="submit" value="Enviar">
                <input class="button" type="reset" value="Limpiar">
            </form>
        </section>
    </main>
